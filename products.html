<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เมนูขนม | บ้านอบอวล</title>
    <meta name="description" content="รวมทาร์ตผลไม้ เค้กครีมสด คัสตาร์ด และพายอบจากบ้านอบอวล">
    <meta property="og:type" content="website">
    <meta property="og:title" content="เมนูขนม | บ้านอบอวล">
    <meta property="og:description" content="ดูเมนูขนมทั้งหมดจากบ้านอบอวล">
    <meta property="og:image" content="assets/hero-small-products.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="products">
    <header class="site-header" id="site-header"></header>
    <main>
      <section class="page-hero product-page-hero">
        <p class="eyebrow" data-t="products.eyebrow">A menu made for discovery</p>
        <h1 data-t="products.title">All sweets from Baan Ob Auan</h1>
        <p data-t="products.copy">Browse product details here. Online checkout is still in preparation.</p>
      </section>
      <section class="section product-catalogue">
        <aside class="catalogue-notice">
          <strong data-t="products.noticeTitle">A product catalogue for now</strong>
          <p data-t="products.noticeCopy">Ordering buttons are disabled while the shop prepares for ecommerce.</p>
          <a class="text-link" href="contact.html" data-t="common.askShop">Ask the shop</a>
        </aside>
        <div class="filter-tabs" role="group" aria-label="Product filters">
          <button class="active" type="button" data-filter="all" data-t="filter.all">All</button>
          <button type="button" data-filter="cake" data-t="filter.cake">Cakes and tarts</button>
          <button type="button" data-filter="pastry" data-t="filter.pastry">Pastries</button>
          <button type="button" data-filter="gift" data-t="filter.gift">Gift boxes</button>
        </div>
        <div class="product-grid" id="product-grid" aria-live="polite"></div>
      </section>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
    <script src="content.js"></script>
    <script src="site.js"></script>
    <script src="pages.js"></script>
  </body>
</html>
